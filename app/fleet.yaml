
defaultNamespace: ollama

namespaceLabels:
  pod-security.kubernetes.io/enforce: privileged
  pod-security.kubernetes.io/enforce-version: latest

labels:
  app: ollama

# Custom helm options
helm:
  releaseName: ollama
  chart: ollama
  repo: https://otwld.github.io/ollama-helm/
  version: 1.47.0
  values:
    persistentVolume:
      enabled: true