
defaultNamespace: ollama

namespaceLabels:
  pod-security.kubernetes.io/enforce: privileged
  pod-security.kubernetes.io/enforce-version: latest

labels:
  app: ollama

# Custom helm options
helm:
  releaseName: ollama
  chart: ollama
  repo: https://helm.otwld.com/
  version: 1.47.0
  values:
    runtimeClassName: nvidia
    persistentVolume:
      enabled: true
      storageClass: local-path